<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overleaf AI Assistant — Settings</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header class="header">
      <span class="logo">✦</span>
      <div class="header-text">
        <h1>AI Assistant</h1>
        <p>Configure one provider at a time.</p>
      </div>
    </header>

    <main>
      <section class="section">
        <label class="label">Provider</label>
        <div id="provider-tabs" class="provider-tabs" role="tablist" aria-label="Provider">
          <button type="button" class="provider-tab" data-provider="anthropic">Anthropic</button>
          <button type="button" class="provider-tab" data-provider="gemini">Gemini</button>
          <button type="button" class="provider-tab" data-provider="openrouter">OpenRouter</button>
        </div>
        <p class="hint" id="provider-hint"></p>
      </section>

      <section class="section settings-card">
        <div class="card-header">
          <div>
            <h2 id="provider-title" class="card-title">Anthropic</h2>
            <p id="provider-copy" class="card-copy"></p>
          </div>
          <span id="provider-badge" class="provider-badge">Active</span>
        </div>

        <label class="label" for="api-key" id="api-key-label">API Key</label>
        <div class="input-group">
          <input
            type="password"
            id="api-key"
            class="input"
            placeholder="sk-ant-api…"
            autocomplete="off"
            spellcheck="false"
          >
          <button type="button" id="toggle-visibility" class="icon-btn" title="Show or hide key">Show</button>
        </div>
        <p class="hint" id="api-key-hint"></p>

        <div class="field-row">
          <label class="label" for="model-input">Model</label>
          <button type="button" id="reset-model" class="link-btn">Use Default</button>
        </div>
        <input
          type="text"
          id="model-input"
          class="input"
          autocomplete="off"
          spellcheck="false"
        >
        <p class="hint" id="model-hint"></p>
      </section>

      <section class="section">
        <label class="label">Accent Color</label>
        <div class="swatch-row" id="swatch-row"></div>
        <div class="color-custom-row">
          <input
            type="text"
            id="custom-color-text"
            class="input color-hex-input"
            placeholder="#7c3aed"
            maxlength="7"
            spellcheck="false"
            autocomplete="off"
          >
          <input type="color" id="custom-color-picker" class="color-picker-native" value="#7c3aed">
        </div>
      </section>

      <div id="status-msg" class="status-msg" hidden></div>

      <button id="save-btn" class="btn-primary">Save Settings</button>

      <section class="info-section">
        <h2>Usage</h2>
        <p>Open an Overleaf project, choose a mode in the AI sidebar, then run <strong>Check Document</strong> or <strong>Check Selection</strong>.</p>
      </section>
    </main>

    <footer class="footer">
      Stored locally in Firefox
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
